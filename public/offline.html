<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offline — Just Autos Portal</title>
  <style>
    html,body{height:100%;margin:0}
    body{
      background:#0d0f12;color:#e8eaf0;
      font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    }
    .card{max-width:360px}
    .logo{width:48px;height:48px;border-radius:12px;background:#4f8ef7;color:#fff;
      display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;margin:0 auto 18px}
    h1{font-size:18px;font-weight:600;margin:0 0 8px}
    p{font-size:13.5px;color:#8b90a0;line-height:1.5;margin:0 0 20px}
    button{background:#4f8ef7;color:#fff;border:none;border-radius:8px;padding:11px 18px;
      font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">JA</div>
    <h1>You're offline</h1>
    <p>The Just Autos Portal needs an internet connection — it works with live MYOB and workshop data. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
