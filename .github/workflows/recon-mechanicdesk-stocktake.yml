name: Recon — Mechanics Desk stocktake

# Manual trigger only. This is NOT a scheduled job — we run it once or twice
# to inspect the MD stocktake page, then disable / delete it.
on:
  workflow_dispatch:

jobs:
  recon:
    name: Inspect MD stocktake page
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci || npm install
          npm install --no-save playwright tsx

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run reconnaissance
        env:
          MECHANICDESK_WORKSHOP_ID: ${{ secrets.MECHANICDESK_WORKSHOP_ID }}
          MECHANICDESK_USERNAME:    ${{ secrets.MECHANICDESK_USERNAME }}
          MECHANICDESK_PASSWORD:    ${{ secrets.MECHANICDESK_PASSWORD }}
        run: npx tsx scripts/recon-mechanicdesk-stocktake.ts

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stocktake-recon-${{ github.run_id }}
          path: artifacts/
          retention-days: 14
          if-no-files-found: warn
