name: Probe — MD diary notes + job report

# Recon for the Weekly Sales Recap MD sections (diary notes + forward-dated
# job report). Structure only, no PII. Manual only.

on:
  workflow_dispatch:

jobs:
  run:
    name: probe md diary/jobs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - name: Install Playwright chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium
      - name: Probe
        env:
          MECHANICDESK_WORKSHOP_ID: ${{ secrets.MECHANICDESK_WORKSHOP_ID }}
          MECHANICDESK_USERNAME:    ${{ secrets.MECHANICDESK_USERNAME }}
          MECHANICDESK_PASSWORD:    ${{ secrets.MECHANICDESK_PASSWORD }}
        run: npx tsx scripts/probe-md-diary-jobs.ts
