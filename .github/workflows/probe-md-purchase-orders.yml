name: Probe MD purchase orders (manual)

# One-off diagnostic. Manually triggered. Maps MechanicDesk's purchase
# order endpoints/pages so the JAWS→VPS stock transfer can auto-create
# and receive the matching MD purchase order.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run probe
        env:
          MECHANICDESK_WORKSHOP_ID: ${{ secrets.MECHANICDESK_WORKSHOP_ID }}
          MECHANICDESK_USERNAME:    ${{ secrets.MECHANICDESK_USERNAME }}
          MECHANICDESK_PASSWORD:    ${{ secrets.MECHANICDESK_PASSWORD }}
        run: npx tsx scripts/probe-md-purchase-orders.ts
