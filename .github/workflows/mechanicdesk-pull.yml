name: Mechanics Desk auto-pull

# Cron times in UTC. AEST = UTC + 10 (no DST in QLD).
# Target schedule: 8 AM, 10 AM, 12 PM, 2 PM, 4 PM AEST
#   → 22:00 (prev day), 00:00, 02:00, 04:00, 06:00 UTC
#
# Performance: uses official Playwright container so Chromium and all
# OS deps are pre-installed, eliminating ~60-90s of install time per run.
# When upgrading Playwright: bump image tag to match new version.
on:
  schedule:
    - cron: '0 22 * * *'   # 8  AM AEST
    - cron: '0 0  * * *'   # 10 AM AEST
    - cron: '0 2  * * *'   # 12 PM AEST
    - cron: '0 4  * * *'   # 2  PM AEST
    - cron: '0 6  * * *'   # 4  PM AEST
  workflow_dispatch:

concurrency:
  group: mechanicdesk-pull
  cancel-in-progress: false

jobs:
  pull:
    name: Pull and ingest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run scraper
        env:
          MECHANICDESK_WORKSHOP_ID: ${{ secrets.MECHANICDESK_WORKSHOP_ID }}
          MECHANICDESK_USERNAME:    ${{ secrets.MECHANICDESK_USERNAME }}
          MECHANICDESK_PASSWORD:    ${{ secrets.MECHANICDESK_PASSWORD }}
          JA_PORTAL_API_KEY:        ${{ secrets.JA_PORTAL_API_KEY }}
          JA_PORTAL_BASE_URL:       ${{ secrets.JA_PORTAL_BASE_URL }}
          SLACK_WEBHOOK_URL:        ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_NOTIFY_ON_SUCCESS:  '0'
        run: npx tsx scripts/pull-mechanicdesk-report.ts

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mechanicdesk-pull-debug-${{ github.run_id }}
          path: artifacts/
          retention-days: 14
          if-no-files-found: ignore
