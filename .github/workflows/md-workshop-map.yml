name: Workshop Map — Mechanics Desk daily pull

# Exports the FULL Invoices + Quotes reports from MechanicDesk once daily,
# classifies + geocodes every record, and POSTs fact rows + prebuilt dashboard
# payloads to the portal (/api/workshop/map/ingest). Feeds the
# Reports → Map & conversion dashboard.
#
# Deliberately SEPARATE from the 2h WIP snapshot job (mechanicdesk-pull) —
# this is a heavier full-dataset export, run off-peak.
#
# Triggers:
#   - schedule: daily 03:30 AEST (17:30 UTC)
#   - repository_dispatch ('workshop-map-pull') from /api/workshop/map/refresh
#   - workflow_dispatch (manual)

on:
  repository_dispatch:
    types:
      - workshop-map-pull
  workflow_dispatch:
    inputs:
      from:
        description: 'Pull from date (YYYY-MM-DD) — default 2025-07-01'
        required: false
  schedule:
    - cron: '30 17 * * *'

jobs:
  run:
    name: workshop map pull
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      # Cache the Chromium binary across runs (lives in ~/.cache/ms-playwright).
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Run worker
        env:
          FROM:         ${{ github.event.inputs.from }}
          REQUESTED_BY: ${{ github.event.client_payload.requested_by || 'scheduled' }}
          RUN_ID:       ${{ github.event.client_payload.run_id }}
          MECHANICDESK_WORKSHOP_ID: ${{ secrets.MECHANICDESK_WORKSHOP_ID }}
          MECHANICDESK_USERNAME:    ${{ secrets.MECHANICDESK_USERNAME }}
          MECHANICDESK_PASSWORD:    ${{ secrets.MECHANICDESK_PASSWORD }}
          JA_PORTAL_BASE_URL:       ${{ secrets.JA_PORTAL_BASE_URL }}
          JA_PORTAL_API_KEY:        ${{ secrets.JA_PORTAL_API_KEY }}
          # Optional overrides if MD's export routes differ from the built-in candidates:
          MD_INVOICE_REPORT_PATH:   ${{ vars.MD_INVOICE_REPORT_PATH }}
          MD_QUOTE_REPORT_PATH:     ${{ vars.MD_QUOTE_REPORT_PATH }}
        run: npx tsx scripts/pull-md-workshop-map.ts
