name: Tune jobs -> MD customers (nightly)

# Distributor tune jobs whose customer details have been filled in on the B2B
# portal become MechanicDesk customers. See scripts/import-tune-jobs.ts.

on:
  schedule:
    - cron: '30 16 * * *'   # 2:30am Brisbane (after the Monday-leads import)
  workflow_dispatch:
    inputs:
      mode:
        description: Run mode
        type: choice
        options: [real, dry-run]
        default: dry-run

jobs:
  run:
    name: import tune jobs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Import
        env:
          MECHANICDESK_WORKSHOP_ID: ${{ secrets.MECHANICDESK_WORKSHOP_ID }}
          MECHANICDESK_USERNAME:    ${{ secrets.MECHANICDESK_USERNAME }}
          MECHANICDESK_PASSWORD:    ${{ secrets.MECHANICDESK_PASSWORD }}
          JA_PORTAL_BASE_URL:       ${{ secrets.JA_PORTAL_BASE_URL }}
          JA_PORTAL_API_KEY:        ${{ secrets.JA_PORTAL_API_KEY }}
          DRY_RUN:                  ${{ inputs.mode == 'dry-run' && '1' || '' }}
        run: npx tsx scripts/import-tune-jobs.ts
